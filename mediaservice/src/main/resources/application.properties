spring.application.name=mediaservice

spring.datasource.url=jdbc:postgresql://localhost:5432/Music_service_db
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver

# S3 Configuration
aws.s3.access-key=minioadmin
aws.s3.secret-key=minioadmin
aws.s3.region=eu-central-1
aws.s3.bucket-name=music-service-assets
aws.s3.endpoint=http://localhost:9000
spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate=DEBUG
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect