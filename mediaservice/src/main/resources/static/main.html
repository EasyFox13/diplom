<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify - Clone Edition</title>
    <link rel="icon" href="data:,">
    <style>
        :root {
            --bg-base: #000000;
            --bg-surface: #121212;
            --bg-card: #181818;
            --bg-card-hover: #282828;
            --text-base: #ffffff;
            --text-muted: #b3b3b3;
            --spotify-green: #1ed760;
        }

        body {
            font-family: 'Circular Sp', 'Segoe UI', Helvetica, Arial, sans-serif;
            background-color: var(--bg-base);
            color: var(--text-base);
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        /* ГЛАВНЫЙ КОНТЕЙНЕР ДЛЯ СЕТКИ */
        .app-container {
            display: grid;
            grid-template-columns: 280px 1fr;
            width: 100%;
            height: calc(100vh - 90px); /* Оставляем 90px под плеер */
            padding: 8px;
            gap: 8px;
            box-sizing: border-box;
        }

        /* ЛЕВЫЙ САЙДБАР */
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .sidebar-box {
            background-color: var(--bg-surface);
            border-radius: 8px;
            padding: 20px;
        }

        .nav-menu {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .nav-menu li {
            padding: 12px 0;
            font-weight: bold;
            color: var(--text-muted);
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .nav-menu li:hover { color: var(--text-base); }
        .nav-menu li.active { color: var(--text-base); }

        .library-scroll {
            margin-top: 10px;
            overflow-y: auto;
            max-height: 250px;
        }

        /* ОСНОВНОЙ КОНТЕНТ */
        .main-content {
            background: linear-gradient(to bottom, #222222, var(--bg-surface) 40%);
            border-radius: 8px;
            padding: 24px;
            overflow-y: auto;
        }

        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        h1, h2 { margin: 0; font-weight: 700; }
        h1 { font-size: 32px; }
        h2 { font-size: 24px; margin-bottom: 16px; }

        /* ВЕРХНЯЯ СЕТКА ПЛИТОК (Быстрый доступ) */
        .quick-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 16px;
            margin-bottom: 32px;
        }

        .quick-card {
            background-color: rgba(255,255,255,0.1);
            border-radius: 4px;
            display: flex;
            align-items: center;
            overflow: hidden;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .quick-card:hover { background-color: rgba(255,255,255,0.2); }
        .quick-card img { width: 80px; height: 80px; object-fit: cover; background: #333; }
        .quick-card span { padding: 16px; font-weight: bold; }

        /* СЕТКА С КРУПНЫМИ КАРТОЧКАМИ (Альбомы / Плейлисты) */
        .shelf-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 24px;
        }

        .spotify-card {
            background-color: var(--bg-card);
            padding: 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s;
            position: relative;
        }
        .spotify-card:hover { background-color: var(--bg-card-hover); }

        .spotify-card img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            border-radius: 6px;
            margin-bottom: 16px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
        }

        .spotify-card .title { font-weight: bold; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .spotify-card .desc { color: var(--text-muted); font-size: 14px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        /* КНОПКА PLAY НА КАРТОЧКЕ (Появляется при наведении) */
        .play-btn-overlay {
            position: absolute; right: 24px; bottom: 80px;
            width: 48px; height: 48px; background-color: var(--spotify-green);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            opacity: 0; transform: translateY(8px); transition: 0.3s;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
        }
        .spotify-card:hover .play-btn-overlay { opacity: 1; transform: translateY(0); }
        .play-btn-overlay::after { content: '▶'; color: black; font-size: 18px; margin-left: 4px; }

        /* НИЖНИЙ ПЛЕЕР НА ВСЮ ШИРИНУ */
        .bottom-player {
            position: fixed; bottom: 0; left: 0; right: 0;
            height: 90px; background-color: #181818; border-top: 1px solid #282828;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 16px; box-sizing: border-box; z-index: 1000;
        }

        .player-left { display: flex; align-items: center; gap: 14px; width: 30%; }
        .player-left img { width: 56px; height: 56px; border-radius: 4px; object-fit: cover; background: #333; }
        .track-info-text { display: flex; flex-direction: column; }
        .track-info-text .name { font-size: 14px; font-weight: 500; }
        .track-info-text .artist { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

        .player-center { display: flex; flex-direction: column; align-items: center; width: 40%; gap: 8px; }
        .controls-buttons { display: flex; align-items: center; gap: 24px; color: var(--text-muted); font-size: 18px; cursor: pointer; }
        .controls-buttons span:hover { color: var(--text-base); }
        .play-pause-circle { width: 32px; height: 32px; background: white; color: black; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; }

        .progress-bar-container { display: flex; align-items: center; width: 100%; gap: 8px; font-size: 11px; color: var(--text-muted); }
        audio { width: 100%; height: 30px; outline: none; filter: invert(90%); } /* Быстрый стильный костыль для плеера */

        .player-right { display: flex; justify-content: flex-end; width: 30%; color: var(--text-muted); }

        /* Стилизация скроллбара под Spotify */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #555; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #888; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="sidebar">
        <div class="sidebar-box">
            <ul class="nav-menu">
                <li class="active"><span>🏠</span> Главная</li>
                <li><span>🔍</span> Поиск</li>
            </ul>
        </div>
        <div class="sidebar-box" style="flex: 1; display: flex; flex-direction: column;">
            <div style="font-weight: bold; color: var(--text-muted); display: flex; gap: 10px; align-items: center;">
                <span>📚</span> Моя медиатека
            </div>
            <div class="library-scroll" id="sidebarAlbums">
                <div style="color: #555; font-size: 13px; padding-top: 10px;">Загрузка альбомов...</div>
            </div>
        </div>
    </div>

    <div class="main-content">
        <div class="header-actions">
            <h1>Добрый день</h1>
        </div>

        <div class="quick-grid" id="quickGridContainer">
        </div>

        <h2>Только для тебя</h2>
        <div class="shelf-grid" id="shelfGridContainer">
        </div>
    </div>
</div>

<div class="bottom-player">
    <div class="player-left">
        <img id="playerCover" src="https://via.placeholder.com/56?text=ID" alt="Обложка">
        <div class="track-info-text">
            <span class="name" id="playerTrackName">Ничего не играет</span>
            <span class="artist" id="playerTrackArtist">Плеер пуст</span>
        </div>
    </div>

    <div class="player-center">
        <div class="progress-bar-container">
            <audio id="audioPlayer" controls controlsList="nodownload"></audio>
        </div>
    </div>

    <div class="player-right">
        <span style="cursor: pointer;" onclick="alert('Громкость управляется внутри плеера!')">🔊</span>
    </div>
</div>

<script>
    const TRACKS_API = "http://localhost:8080/api/tracks";
    const ALBUMS_API = "http://localhost:8080/api/albums";

    // 1. ИНИЦИАЛИЗАЦИЯ И ЗАГРУЗКА ДАННЫХ
    async function initDashboard() {
        try {
            // Тянем треки для проверки
            const tracksRes = await fetch(TRACKS_API);
            const tracksData = await tracksRes.json();

            // В реальном приложении мы бы тянули список альбомов с эндпоинта GET /api/albums
            // Давай сымитируем или попробуем загрузить альбомы с ID от 1 до 3 для демонстрации карточек.
            // Если у тебя готов эндпоинт GET /api/albums, подставь его обработку.
            // Сейчас сделаем запросы к известным ID, чтобы собрать сетку.

            const albumIds = [1, 2, 3]; // Проверим первые три ID
            const loadedAlbums = [];

            for(let id of albumIds) {
                const res = await fetch(`${ALBUMS_API}/${id}`);
                if(res.ok) {
                    const album = await res.json();
                    loadedAlbums.push(album);
                }
            }

            renderSidebar(loadedAlbums);
            renderQuickGrid(loadedAlbums);
            renderShelf(loadedAlbums);

        } catch (error) {
            console.error("Ошибка инициализации интерфейса:", error);
        }
    }

    // 2. РЕНДЕР ЛЕВОГО САЙДБАРА
    function renderSidebar(albums) {
        const container = document.getElementById("sidebarAlbums");
        container.innerHTML = "";

        if(albums.length === 0) {
            container.innerHTML = "<div style='color:#555;font-size:13px;'>Медиатека пуста</div>";
            return;
        }

        albums.forEach(album => {
            const div = document.createElement("div");
            div.style.padding = "8px 0";
            div.style.cursor = "pointer";
            div.style.fontSize = "14px";
            div.style.color = "#b3b3b3";
            div.innerHTML = `💿 ${album.title}`;
            div.onmouseover = () => div.style.color = "#fff";
            div.onmouseout = () => div.style.color = "#b3b3b3";
            // При клике на альбом в сайдбаре запускаем первый трек из него
            div.onclick = () => playFirstTrackFromAlbum(album);
            container.appendChild(div);
        });
    }

    // 3. РЕНДЕР БЫСТРЫХ СЕТОК СВЕРХУ
    function renderQuickGrid(albums) {
        const container = document.getElementById("quickGridContainer");
        container.innerHTML = "";

        albums.forEach(album => {
            const card = document.createElement("div");
            card.className = "quick-card";
            card.innerHTML = `
                <img src="${album.coverUrl || 'https://via.placeholder.com/80?text=Music'}" alt="Cover">
                <span>${album.title}</span>
            `;
            card.onclick = () => playFirstTrackFromAlbum(album);
            container.appendChild(card);
        });
    }

    // 4. РЕНДЕР КРУПНЫХ КАРТОЧЕК СНИЗУ
    function renderShelf(albums) {
        const container = document.getElementById("shelfGridContainer");
        container.innerHTML = "";

        albums.forEach(album => {
            const card = document.createElement("div");
            card.className = "spotify-card";
            card.innerHTML = `
                <img src="${album.coverUrl || 'https://via.placeholder.com/150?text=No+Cover'}" alt="Cover">
                <div class="title">${album.title}</div>
                <div class="desc">Альбом • ID ${album.albumId}</div>
                <div class="play-btn-overlay"></div>
            `;
            card.onclick = () => playFirstTrackFromAlbum(album);
            container.appendChild(card);
        });
    }

    // Вспомогательная функция: включает первый трек из выбранного альбома
    function playFirstTrackFromAlbum(album) {
        if (album.tracks && album.tracks.length > 0) {
            const firstTrack = album.tracks[0];
            playTrack(firstTrack.trackId, firstTrack.title, album.coverUrl, album.title);
        } else {
            alert(`В альбоме "${album.title}" пока нет треков для воспроизведения.`);
        }
    }

    // 5. ФУНКЦИЯ КЛИКА ПО ТРЕКУ (Загрузка в плеер)
    function playTrack(trackId, title, coverUrl, albumTitle) {
        const player = document.getElementById("audioPlayer");

        // Обновляем карточку плеера слева
        document.getElementById("playerTrackName").innerText = title;
        document.getElementById("playerTrackArtist").innerText = albumTitle || "Синглы";
        document.getElementById("playerCover").src = coverUrl || "https://via.placeholder.com/56?text=Music";

        // Подставляем стрим
        player.src = `${TRACKS_API}/${trackId}/stream`;
        player.play();
    }

    // Запуск при старте
    initDashboard();
</script>
</body>
</html>
