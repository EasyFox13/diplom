<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Player - Home</title>
    <link rel="icon" href="data:,">
    <style>
        :root {
            --bg-main: #202020;
            --bg-dark: #121212;
            --text-main: #ffffff;
            --text-muted: #aaaaaa;
            --spotify-green: #1ed760;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        /* 1. ВЕРХНЯЯ ПАНЕЛЬ */
        .app-header {
            height: 64px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 24px;
            box-sizing: border-box;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .logo-circle {
            width: 32px; height: 32px;
            background-color: #ffffff; border-radius: 50%;
            cursor: pointer;
        }

        .nav-home-btn {
            background: none;
            border: none;
            color: #ffffff;
            font-size: 24px;
            font-weight: 300;
            cursor: pointer;
            padding: 0 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.2s, transform 0.1s;
            opacity: 0.5;
        }
        .nav-home-btn:hover { transform: scale(1.1); }
        .nav-home-btn:active { transform: scale(0.95); }

        .header-center {
            display: flex; align-items: center;
            background-color: #2a2a2a; border-radius: 20px;
            padding: 6px 16px; width: 400px;
        }
        .header-center input {
            background: transparent; border: none; color: white;
            outline: none; width: 100%; font-size: 14px; margin-left: 10px;
        }
        .profile-icon {
            width: 36px; height: 36px; border: 2px solid var(--text-muted);
            border-radius: 50%; display: flex; align-items: center;
            justify-content: center; cursor: pointer; font-size: 20px;
        }

        /* 2. ОСНОВНОЙ БЛОК */
        .main-layout {
            display: flex; flex: 1; padding: 0 16px 16px 16px; gap: 16px;
            height: calc(100vh - 64px - 150px); box-sizing: border-box;
        }
        .smooth-box {
            background-color: var(--bg-dark); border-radius: 35px;
            padding: 24px; box-sizing: border-box; overflow-y: auto;
        }
        .sidebar { width: 300px; min-width: 250px; }
        .sidebar h3 { margin-top: 0; color: var(--text-muted); font-size: 15px; font-weight: normal; margin-bottom: 15px; }
        .content-area { flex: 1; }

        .sidebar-album-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #222;
            margin-bottom: 12px;
            padding: 10px 14px;
            border-radius: 25px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }
        .sidebar-album-card:hover { background-color: #2a2a2a; }
        .sidebar-album-card:active { transform: scale(0.98); }

        .sidebar-card-left { display: flex; align-items: center; gap: 12px; overflow: hidden; }
        .sidebar-card-cover { width: 38px; height: 38px; border-radius: 50%; object-fit: cover; flex-shrink: 0; }
        .sidebar-card-title { color: #fff; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 500; }

        .sidebar-card-play-btn {
            width: 30px; height: 30px; border-radius: 50%; border: none;
            background: #fff; color: #000; font-size: 12px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; font-weight: bold; transition: background 0.2s, color 0.2s;
        }
        .sidebar-album-card.active-playing .sidebar-card-play-btn {
            background: var(--spotify-green); color: #fff;
        }

        .album-header { display: flex; gap: 24px; align-items: flex-end; margin-bottom: 30px; }
        .album-header-cover { width: 180px; height: 180px; border-radius: 20px; object-fit: cover; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
        .album-header-info h1 { margin: 0 0 8px 0; font-size: 32px; }
        .album-header-info p { margin: 0; color: var(--text-muted); font-size: 14px; }

        .tracks-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .tracks-table th { text-align: left; padding: 12px; color: var(--text-muted); font-size: 13px; border-bottom: 1px solid #252525; font-weight: normal; }
        .track-row { cursor: pointer; transition: background 0.2s; }
        .track-row:hover { background-color: rgba(255,255,255,0.05); border-radius: 4px; }
        .track-row td { padding: 12px; border-bottom: 1px solid #1a1a1a; font-size: 14px; }
        .track-row.playing-now { color: var(--spotify-green); }

        .recommendations-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; }

        .rec-card {
            background-color: #1a1a1a;
            padding: 16px;
            border-radius: 16px;
            cursor: pointer;
            transition: 0.2s;
            text-align: center;
            position: relative;
        }
        .rec-card:hover { background-color: #252525; }
        .rec-card img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 12px; margin-bottom: 10px; }
        .rec-card .title { font-weight: bold; font-size: 14px; }

        .add-album-btn {
            position: absolute;
            right: 24px;
            bottom: 45px;
            width: 32px;
            height: 32px;
            background-color: rgba(0, 0, 0, 0.7);
            border: 1px solid #555;
            color: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            opacity: 0;
            transform: scale(0.9);
        }
        .rec-card:hover .add-album-btn { opacity: 1; transform: scale(1); }
        .add-album-btn:hover { background-color: var(--text-main); color: black; border-color: var(--text-main); scale: 1.05; }

        /* Блок результатов поиска */
        .search-results-section { margin-top: 10px; }

        /* 3. КАСТОМНЫЙ НИЖНИЙ ПЛЕЕР */
        .bottom-player {
            height: 150px;
            background-color: var(--bg-dark);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            box-sizing: border-box;
            border-top: 1px solid #252525;
        }

        .player-track-info { display: flex; align-items: center; gap: 12px; width: 30%; }
        .cover-placeholder { width: 52px; height: 52px; background-color: #333; border: 2px solid white; object-fit: cover; }
        .meta { display: flex; flex-direction: column; font-family: monospace; }
        .meta .t-title { font-size: 14px; font-weight: bold; }
        .meta .t-artist { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

        .player-controls-container { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 40%; gap: 12px; }
        .playback-buttons { display: flex; align-items: center; gap: 24px; font-size: 22px; }
        .playback-buttons span { cursor: pointer; user-select: none; transition: 0.1s; display: inline-block; width: 24px; text-align: center; }
        .playback-buttons span:hover { color: var(--spotify-green); }
        #globalPlayBtn { font-size: 28px; font-weight: bold; }

        .player-right-container { display: flex; align-items: center; justify-content: flex-end; width: 30%; }

        .slider-wrapper { display: flex; align-items: center; gap: 10px; font-size: 12px; color: var(--text-muted); font-family: monospace; width: 100%; justify-content: center; }

        input[type="range"] { -webkit-appearance: none; appearance: none; background: #404040; height: 4px; border-radius: 2px; outline: none; cursor: pointer; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 10px; height: 10px; border-radius: 50%; background: white; transition: 0.1s; }
        input[type="range"]:hover::-webkit-slider-thumb { background: var(--spotify-green); scale: 1.2; }

        #timelineSlider { width: 100%; max-width: 400px; }
        #volumeSlider { width: 100px; }
    </style>
</head>
<body>

<header class="app-header">
    <div class="header-left">
        <div class="logo-circle" onclick="showMainPage()"></div>
        <button id="navHomeBtn" class="nav-home-btn" onclick="showMainPage()" title="На главную">‹</button>
    </div>
    <div class="header-center">
        <span>🔍</span>
        <input type="text" id="searchInput" oninput="handleSearch(this.value)" placeholder="Что хочешь включить?">
    </div>
    <div class="header-right">
        <div style="display: flex; align-items: center; gap: 10px;">
            <span id="displayUsername" style="font-weight: bold; font-size: 14px; color: #aaa;">Гость</span>
            <div class="profile-icon" onclick="logout()" title="Выйти">👤</div>
        </div>
    </div>
</header>

<main class="main-layout">
    <div class="sidebar smooth-box">
        <h3>все плейлисты и сохраненные альбомы пользователя</h3>
        <div id="sidebarAlbumsList"><div style="color: #444; font-size: 13px;">Загрузка...</div></div>
    </div>

    <div class="content-area smooth-box">
        <div id="mainPageSection">
            <div id="recommendationsSubSection">
                <h2 id="mainSectionHeader">всякие рекомендации</h2>
                <div class="recommendations-grid" id="recGrid"></div>
            </div>

            <div id="searchResultsSubSection" style="display: none;" class="search-results-section">
                <h2>Результаты поиска по трекам</h2>
                <table class="tracks-table">
                    <thead>
                    <tr>
                        <th style="width: 40px; text-align: center;">#</th>
                        <th>Название трека</th>
                        <th>Альбом</th>
                        <th>BPM</th>
                        <th style="width: 80px; text-align: right;">Длительность</th>
                    </tr>
                    </thead>
                    <tbody id="searchResultsList"></tbody>
                </table>
            </div>
        </div>

        <div id="albumPageSection" style="display: none;">
            <div class="album-header">
                <img class="album-header-cover" id="albumPageCover" src="">
                <div class="album-header-info">
                    <p style="text-transform: uppercase; letter-spacing: 1px; color: var(--spotify-green); font-weight: bold; margin-bottom: 5px;">Альбом</p>
                    <h1 id="albumPageTitle">Название альбома</h1>
                </div>
            </div>

            <table class="tracks-table">
                <thead>
                <tr>
                    <th style="width: 40px; text-align: center;">#</th>
                    <th>Название трека</th>
                    <th>BPM</th>
                    <th style="width: 80px; text-align: right;">Длительность</th>
                </tr>
                </thead>
                <tbody id="albumTracksList"></tbody>
            </table>
        </div>
    </div>
</main>

<audio id="audioPlayer" style="display: none;"></audio>

<footer class="bottom-player">
    <div class="player-track-info">
        <img class="cover-placeholder" id="pCover" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='52' height='52'><rect width='52' height='52' fill='%23333'/></svg>">
        <div class="meta">
            <span class="t-title" id="pTitle">title</span>
            <span class="t-artist" id="pArtist">artist</span>
        </div>
    </div>

    <div class="player-controls-container">
        <div class="playback-buttons">
            <span id="prevBtn">&lt;</span>
            <span id="globalPlayBtn">▷</span>
            <span id="nextBtn">&gt;</span>
        </div>

        <div class="slider-wrapper">
            <span id="currentTimeText">0:00</span>
            <input type="range" id="timelineSlider" min="0" value="0" step="1">
            <span id="durationTimeText">0:00</span>
        </div>
    </div>

    <div class="player-right-container">
        <div class="slider-wrapper" style="justify-content: flex-end;">
            <span>🔊</span>
            <input type="range" id="volumeSlider" min="0" max="1" value="0.7" step="0.01">
        </div>
    </div>
</footer>

<script>
    const TRACKS_API = "http://localhost:8080/api/tracks";
    const ALBUMS_API = "http://localhost:8080/api/albums";

    const audio = document.getElementById("audioPlayer");
    const playBtn = document.getElementById("globalPlayBtn");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const timeline = document.getElementById("timelineSlider");
    const volume = document.getElementById("volumeSlider");

    const currentTimeText = document.getElementById("currentTimeText");
    const durationTimeText = document.getElementById("durationTimeText");

    let currentAlbumTracks = [];
    let currentTrackIndex = -1;
    let currentAlbumTitle = "";
    let currentAlbumCover = "";

    let cachedSavedAlbums = [];
    let currentOpenedAlbum = null;

    function logout() {
        if(confirm("Вы действительно хотите выйти?")) {
            localStorage.removeItem("currentUsername");
            localStorage.removeItem("currentUserId");
            window.location.href = "login.html";
        }
    }

    const savedName = localStorage.getItem("currentUsername");
    const savedId = localStorage.getItem("currentUserId");

    if (!savedName || !savedId) {
        window.location.href = "login.html";
    } else {
        document.addEventListener("DOMContentLoaded", () => {
            document.getElementById("displayUsername").innerText = savedName;
        });
    }

    // ВНЕДРЕНО: Функция живого поиска треков
    async function handleSearch(query) {
        const recommendationsBox = document.getElementById("recommendationsSubSection");
        const searchBox = document.getElementById("searchResultsSubSection");
        const resultsContainer = document.getElementById("searchResultsList");

        // Если строка пустая, скрываем результаты поиска и возвращаем рекомендации
        if (!query.trim()) {
            searchBox.style.display = "none";
            recommendationsBox.style.display = "block";
            return;
        }

        // Если мы находились на странице альбома, при поиске возвращаем на главную вкладку
        document.getElementById("albumPageSection").style.display = "none";
        document.getElementById("mainPageSection").style.display = "block";

        try {
            // Делаем GET запрос на эндпоинт поиска (например, /api/tracks/search?query=...)
            const response = await fetch(`${TRACKS_API}/search?query=${encodeURIComponent(query)}`);

            searchBox.style.display = "block";
            recommendationsBox.style.display = "none";
            resultsContainer.innerHTML = "";

            if (!response.ok) {
                resultsContainer.innerHTML = "<tr><td colspan='5' style='color:#ff6b6b; text-align:center;'>Ошибка сервера при поиске</td></tr>";
                return;
            }

            const tracks = await response.json();

            if (tracks.length === 0) {
                resultsContainer.innerHTML = "<tr><td colspan='5' style='color:#777; text-align:center;'>Ничего не найдено</td></tr>";
                return;
            }

            // Рендерим найденные треки
            tracks.forEach((track, index) => {
                const tr = document.createElement("tr");
                tr.className = "track-row";

                const isCurrentTrackPlaying = currentAlbumTracks[currentTrackIndex]?.trackId === track.trackId;
                if (isCurrentTrackPlaying) {
                    tr.classList.add("playing-now");
                }

                // Выводим: Номер, Название, Название альбома, BPM, Длительность
                   // ИСПРАВЛЕНО: Проверяем наличие объекта album и берем его title
                const albumName = track.album ? (track.album.title || track.album.name) : "—";

                tr.innerHTML = `
                <td style="text-align: center; color: var(--text-muted);">${index + 1}</td>
                <td style="font-weight: 500;">${track.title || "Без названия"}</td>
                <td style="color: var(--text-muted);">${albumName}</td>
                <td style="color: var(--text-muted);">${track.bpm || "—"}</td>
                <td style="text-align: right; color: var(--text-muted); font-family: monospace;">${formatTime(track.duration)}</td>
                `;

                // При клике на трек из поиска — формируем очередь из всех результатов поиска
               tr.onclick = () => {
                currentAlbumTracks = tracks;
                currentTrackIndex = index;
                currentAlbumTitle = track.album ? (track.album.title || track.album.name) : "Найденные треки";
                currentAlbumCover = track.album ? track.album.coverUrl : "";
                playCurrentTrack();
                };

                resultsContainer.appendChild(tr);
            });

        } catch (error) {
            console.error("Ошибка при выполнении поиска:", error);
            resultsContainer.innerHTML = "<tr><td colspan='5' style='color:#ff6b6b; text-align:center;'>Ошибка подключения к бэкенду</td></tr>";
        }
    }

    function showAlbumPage(album) {
        currentOpenedAlbum = album;
        document.getElementById("mainPageSection").style.display = "none";
        document.getElementById("albumPageSection").style.display = "block";
        document.getElementById("navHomeBtn").style.opacity = "1";
        renderAlbumTracks(album);
    }

    function showMainPage() {
        currentOpenedAlbum = null;
        document.getElementById("mainPageSection").style.display = "block";
        document.getElementById("albumPageSection").style.display = "none";
        document.getElementById("navHomeBtn").style.opacity = "0.5";

        // Очищаем поиск при принудительном возврате на главную
        document.getElementById("searchInput").value = "";
        document.getElementById("searchResultsSubSection").style.display = "none";
        document.getElementById("recommendationsSubSection").style.display = "block";
    }

    function renderSidebar(albums) {
        cachedSavedAlbums = albums;
        const container = document.getElementById("sidebarAlbumsList");
        container.innerHTML = "";

        if (!albums || albums.length === 0) {
            container.innerHTML = "<div style='color: #444; font-size: 13px; padding-left: 10px;'>Медиатека пуста</div>";
            return;
        }

        albums.forEach(album => {
            const card = document.createElement("div");
            card.className = "sidebar-album-card";

            const isThisAlbumPlaying = (currentAlbumTitle === (album.title || album.name));
            if (isThisAlbumPlaying) {
                card.classList.add("active-playing");
            }

            const leftPart = document.createElement("div");
            leftPart.className = "sidebar-card-left";

            const img = document.createElement("img");
            img.className = "sidebar-card-cover";
            img.src = album.coverUrl || "https://via.placeholder.com/150?text=No+Cover";
            img.onerror = function() { this.src = "https://via.placeholder.com/150?text=No+Cover"; };

            const titleSpan = document.createElement("span");
            titleSpan.className = "sidebar-card-title";
            titleSpan.innerText = album.title || album.name || `Альбом №${album.albumId || album.id}`;

            leftPart.appendChild(img);
            leftPart.appendChild(titleSpan);

            const sidebarPlayBtn = document.createElement("button");
            sidebarPlayBtn.className = "sidebar-card-play-btn";
            sidebarPlayBtn.innerHTML = (isThisAlbumPlaying && !audio.paused) ? "||" : "▷";

            card.onclick = () => showAlbumPage(album);

            sidebarPlayBtn.onclick = (e) => {
                e.stopPropagation();
                if (isThisAlbumPlaying) {
                    if (audio.paused) audio.play(); else audio.pause();
                } else {
                    loadAndPlayAlbum(album, 0);
                }
            };

            card.appendChild(leftPart);
            card.appendChild(sidebarPlayBtn);
            container.appendChild(card);
        });
    }

    function renderAlbumTracks(album) {
        const container = document.getElementById("albumTracksList");
        container.innerHTML = "";

        if (!album.tracks || album.tracks.length === 0) {
            container.innerHTML = "<tr><td colspan='4' style='color:#777; text-align:center;'>В этом альбоме нет треков</td></tr>";
            return;
        }

        album.tracks.forEach((track, index) => {
            const tr = document.createElement("tr");
            tr.className = "track-row";

            const isCurrentTrackPlaying = currentAlbumTracks[currentTrackIndex]?.trackId === track.trackId;
            if (isCurrentTrackPlaying) {
                tr.classList.add("playing-now");
            }

            tr.innerHTML = `
                <td style="text-align: center; color: var(--text-muted);">${index + 1}</td>
                <td style="font-weight: 500;">${track.title || "Без названия"}</td>
                <td style="color: var(--text-muted);">${track.bpm || "—"}</td>
                <td style="text-align: right; color: var(--text-muted); font-family: monospace;">${formatTime(track.duration)}</td>
            `;

            tr.onclick = () => loadAndPlayAlbum(album, index);
            container.appendChild(tr);
        });
    }

    function renderRecommendations(albums) {
        const container = document.getElementById("recGrid");
        container.innerHTML = "";

        if (!albums || albums.length === 0) {
            container.innerHTML = "<div style='color:#555;'>Тут пока пусто</div>";
            return;
        }

        albums.forEach(album => {
            const card = document.createElement("div");
            card.className = "rec-card";

            card.innerHTML = `
                <img src="${album.coverUrl || 'https://via.placeholder.com/150?text=No+Cover'}"
                     alt="Cover"
                     onerror="this.onerror=null; this.src='https://via.placeholder.com/150?text=No+Cover';">
                <div class="title">${album.title || "Без названия"}</div>
                <div class="add-album-btn" title="Добавить в медиатеку">+</div>
            `;

            card.onclick = () => showAlbumPage(album);

            const addBtn = card.querySelector(".add-album-btn");
            addBtn.onclick = (e) => {
                e.stopPropagation();
                saveAlbumToUserLibrary(album.albumId || album.id);
            };

            container.appendChild(card);
        });
    }

    async function initApp() {
        const userId = localStorage.getItem("currentUserId");
        if (!userId) return;

        try {
            const resSaved = await fetch(`http://localhost:8080/api/users/${userId}/saved-albums`);
            if (resSaved.ok) {
                const savedAlbums = await resSaved.json();
                renderSidebar(savedAlbums);
            } else {
                document.getElementById("sidebarAlbumsList").innerHTML = "<div style='color: #ff6b6b; font-size: 13px;'>Ошибка загрузки</div>";
            }

            const resRec = await fetch(ALBUMS_API);
            if (resRec.ok) {
                const recAlbums = await resRec.json();
                renderRecommendations(recAlbums);
            } else {
                console.error("Не удалось получить список альбомов с бэкенда");
            }

        } catch (e) {
            console.error("Ошибка загрузки данных приложения:", e);
        }
    }

    function loadAndPlayAlbum(album, trackIndex) {
        if(!album.tracks || album.tracks.length === 0) {
            alert(`В альбоме "${album.title || 'Без названия'}" нет треков.`);
            return;
        }
        currentAlbumTracks = album.tracks;
        currentTrackIndex = trackIndex;
        currentAlbumTitle = album.title || album.name || "Без названия";
        currentAlbumCover = album.coverUrl;

        playCurrentTrack();
    }

    function playCurrentTrack() {
        const track = currentAlbumTracks[currentTrackIndex];

        document.getElementById("pTitle").innerText = track.title;

        // Определяем имя альбома для плеера
        let displayAlbumName = currentAlbumTitle;
        if (track.album) {
            displayAlbumName = track.album.title || track.album.name || currentAlbumTitle;
        }
        document.getElementById("pArtist").innerText = displayAlbumName;

        const pCover = document.getElementById("pCover");
        if(pCover) {
            let displayCover = currentAlbumCover;
            if (track.album && track.album.coverUrl) {
                displayCover = track.album.coverUrl;
            }
            pCover.src = displayCover || "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='52' height='52'><rect width='52' height='52' fill='%23333'/></svg>";
            pCover.onerror = function() { this.src = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='52' height='52'><rect width='52' height='52' fill='%23333'/></svg>"; };
        }

        audio.src = `${TRACKS_API}/${track.trackId || track.id}/stream`;
        audio.play();

        updateLiveUI();
    }

    function updateLiveUI() {
        renderSidebar(cachedSavedAlbums);
        if (currentOpenedAlbum && (currentOpenedAlbum.title === currentAlbumTitle || currentOpenedAlbum.name === currentAlbumTitle)) {
            renderAlbumTracks(currentOpenedAlbum);
        }
        // Также обновляем стили подсвеченного трека в результатах поиска, если он открыт
        const searchInput = document.getElementById("searchInput").value;
        if (searchInput.trim() && document.getElementById("searchResultsSubSection").style.display !== "none") {
            const rows = document.querySelectorAll("#searchResultsList .track-row");
            rows.forEach((row, idx) => {
                const isPlaying = currentAlbumTracks[currentTrackIndex]?.trackId === currentAlbumTracks[idx]?.trackId;
                if (isPlaying) row.classList.add("playing-now"); else row.classList.remove("playing-now");
            });
        }
    }

    async function saveAlbumToUserLibrary(albumId) {
        const userId = localStorage.getItem("currentUserId");
        if (!userId) return;

        try {
            const response = await fetch(`http://localhost:8080/api/users/${userId}/save-album/${albumId}`, {
                method: "POST"
            });

            if (response.ok) {
                alert("Альбом успешно добавлен в вашу медиатеку!");
                setTimeout(async () => {
                    const resSaved = await fetch(`http://localhost:8080/api/users/${userId}/saved-albums`);
                    if (resSaved.ok) {
                        renderSidebar(await resSaved.json());
                    }
                }, 300);
            } else {
                alert("Альбом сохранен в базу.");
                setTimeout(initApp, 300);
            }
        } catch (error) {
            console.error("Ошибка при сохранении альбома:", error);
        }
    }

    function formatTime(seconds) {
        if (isNaN(seconds) || seconds === null) return "0:00";
        const mins = Math.floor(seconds / 60);
        const secs = Math.floor(seconds % 60);
        return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
    }

    playBtn.onclick = () => {
        if (!audio.src) return;
        if (audio.paused) audio.play(); else audio.pause();
    };

    audio.onplay = () => { playBtn.innerText = "||"; updateLiveUI(); };
    audio.onpause = () => { playBtn.innerText = "▷"; updateLiveUI(); };

    nextBtn.onclick = () => {
        if (currentAlbumTracks.length === 0) return;
        currentTrackIndex = (currentTrackIndex + 1) % currentAlbumTracks.length;
        playCurrentTrack();
    };

    prevBtn.onclick = () => {
        if (currentAlbumTracks.length === 0) return;
        currentTrackIndex = (currentTrackIndex - 1 + currentAlbumTracks.length) % currentAlbumTracks.length;
        playCurrentTrack();
    };

    audio.onloadedmetadata = () => {
        timeline.max = audio.duration;
        durationTimeText.innerText = formatTime(audio.duration);
    };

    audio.ontimeupdate = () => {
        timeline.value = audio.currentTime;
        currentTimeText.innerText = formatTime(audio.currentTime);
    };

    timeline.oninput = () => { audio.currentTime = timeline.value; };
    volume.oninput = () => { audio.volume = volume.value; };
    audio.onended = () => { nextBtn.click(); };
    audio.volume = volume.value;

    window.onload = () => { initApp(); };
</script>
</body>
</html>
